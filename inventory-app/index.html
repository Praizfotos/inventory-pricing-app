<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StockFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0a2540" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
</head>
<body>

  <!-- Login Modal -->
  <div id="login-modal" class="modal-overlay hidden">
    <div class="modal card">
      <h2 class="modal-title">Admin Login</h2>
      <div class="form-group">
        <input type="password" id="password-input" placeholder="Enter password" />
      </div>
      <p id="login-error" class="form-error hidden">Incorrect password.</p>
      <div class="modal-actions">
        <button id="login-submit" class="btn btn-primary">Login</button>
        <button id="login-cancel" class="btn btn-outline">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Cart Drawer (mobile) -->
  <div id="cart-overlay" class="cart-overlay hidden"></div>
  <aside id="cart-drawer" class="cart-drawer">
    <div class="drawer-header">
      <span class="drawer-title">Cart</span>
      <button id="close-drawer-btn" class="btn-icon-lg">✕</button>
    </div>
    <div id="cart-list" class="cart-list">
      <p class="empty-state">Cart is empty.</p>
    </div>
    <div class="drawer-footer">
      <p id="cart-total" class="cart-total"></p>
      <div id="cart-actions" class="cart-actions hidden">
        <button id="whatsapp-btn" class="btn btn-whatsapp">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          Share via WhatsApp
        </button>
        <button id="copy-invoice-btn" class="btn btn-outline">Copy Invoice</button>
        <button id="clear-cart-btn" class="btn btn-ghost-danger">Clear Cart</button>
      </div>
    </div>
  </aside>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-icon">S</span>
        <span class="brand-name">StockFlow</span>
      </div>
      <div class="header-right">
        <span id="admin-badge" class="admin-badge hidden">Admin</span>
        <button id="login-btn" class="btn btn-outline-light">Login</button>
        <button id="logout-btn" class="btn btn-outline-light hidden">Logout</button>
        <button id="cart-toggle-btn" class="cart-toggle" aria-label="Open cart">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
          <span id="cart-badge" class="cart-badge hidden">0</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="dashboard">

    <!-- Left: Inventory -->
    <div class="dashboard-main">

      <!-- Add Product -->
      <section class="card" id="add-product-section">
        <div class="card-header">
          <h2 class="card-title">Add Product</h2>
        </div>
        <div id="admin-form-wrap">
          <form id="product-form" class="product-form">
            <input type="text" id="product-name" placeholder="Product name" autocomplete="off" />
            <input type="number" id="product-price" placeholder="Price (₦)" min="0" step="0.01" inputmode="decimal" />
            <button type="submit" class="btn btn-primary">Add</button>
          </form>
          <p id="form-error" class="form-error hidden"></p>
        </div>
        <p id="admin-prompt" class="empty-state hidden">Login as admin to add products.</p>
      </section>

      <!-- Product List -->
      <section class="card" id="inventory-section">
        <div class="card-header">
          <h2 class="card-title">Inventory</h2>
          <span id="product-count" class="count-badge">Loading…</span>
        </div>
        <div id="product-list">
          <p class="empty-state">Loading...</p>
        </div>
      </section>

    </div>

    <!-- Right: Cart (desktop sidebar) -->
    <aside class="dashboard-sidebar desktop-only">
      <div class="card cart-card">
        <div class="card-header">
          <h2 class="card-title">Cart</h2>
          <button id="clear-cart-btn-desk" class="btn btn-ghost-danger btn-sm">Clear</button>
        </div>
        <div id="cart-list-desk" class="cart-list">
          <p class="empty-state">Cart is empty.</p>
        </div>
        <div class="drawer-footer">
          <p id="cart-total-desk" class="cart-total"></p>
          <div id="cart-actions-desk" class="cart-actions hidden">
            <button id="whatsapp-btn-desk" class="btn btn-whatsapp">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
              Share via WhatsApp
            </button>
            <button id="copy-invoice-btn-desk" class="btn btn-outline">Copy Invoice</button>
          </div>
        </div>
      </div>
    </aside>

  </main>

  <script type="module" src="js/app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js").catch(console.error);
    }
  </script>
</body>
</html>
