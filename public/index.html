<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PriceCat — Price Catalog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#10b981"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--green:#10b981;--green-dark:#059669;--green-light:#d1fae5;--yellow:#f59e0b;--yellow-light:#fef3c7;--red:#ef4444;--red-light:#fee2e2;--bg:#f0fdf4;--card:#fff;--text:#111827;--muted:#6b7280;--border:#e5e7eb;--radius:12px}
    body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}
    .sidebar{width:220px;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;padding:1.25rem 0;position:fixed;top:0;left:0;height:100vh;z-index:200;transition:transform .3s ease}
    .logo-area{padding:0 1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .logo-text{font-size:1.25rem;font-weight:700;color:var(--green)}
    .logo-sub{font-size:.75rem;color:var(--muted);margin-top:2px}
    .sidebar-close{display:none;background:none;border:none;cursor:pointer;padding:.25rem;color:var(--muted);border-radius:6px}
    nav{padding:1rem .75rem;flex:1;overflow-y:auto}
    .nav-label{font-size:.7rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;padding:0 .5rem;margin-bottom:.5rem;margin-top:1rem}
    .nav-item{display:flex;align-items:center;gap:.625rem;padding:.55rem .75rem;border-radius:8px;cursor:pointer;font-size:.875rem;color:var(--muted);transition:all .15s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left;font-family:'Poppins',sans-serif}
    .nav-item:hover{background:var(--green-light);color:var(--green-dark)}
    .nav-item.active{background:var(--green);color:#fff;font-weight:600}
    .nav-item svg{width:16px;height:16px;flex-shrink:0}
    .sidebar-footer{padding:1rem 1.25rem;border-top:1px solid var(--border);font-size:.75rem;color:var(--muted)}
    .sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199}
    .menu-btn{display:none;background:none;border:none;cursor:pointer;padding:.25rem;border-radius:6px;color:var(--text)}
    @media(max-width:768px){
      .sidebar{transform:translateX(-100%)}
      .sidebar.open{transform:translateX(0)}
      .sidebar-close{display:flex;align-items:center;justify-content:center}
      .sidebar-backdrop.open{display:block}
      .menu-btn{display:flex;align-items:center;justify-content:center}
      .main{margin-left:0!important}
      .grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))!important}
    }
    .main{margin-left:220px;flex:1;display:flex;flex-direction:column}
    .topbar{background:#fff;border-bottom:1px solid var(--border);padding:.875rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:50}
    .topbar h1{font-size:1.1rem;font-weight:700;flex-shrink:0}
    .search-wrap{flex:1;max-width:480px;position:relative}
    .search-wrap svg{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);color:var(--muted);width:16px;height:16px}
    .search-wrap input{width:100%;padding:.5rem .75rem .5rem 2.25rem;border:1px solid var(--border);border-radius:8px;font-size:.875rem;outline:none;background:var(--bg);transition:border-color .15s;color:var(--text);font-family:'Poppins',sans-serif}
    .search-wrap input:focus{border-color:var(--green);background:#fff}
    .topbar-right{margin-left:auto;display:flex;align-items:center;gap:.5rem}
    .badge{background:var(--green);color:#fff;font-size:.75rem;font-weight:600;padding:.25rem .75rem;border-radius:20px}
    .content{padding:1.5rem;flex:1}
    .category-bar{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.25rem}
    .cat-pill{padding:.4rem 1rem;border-radius:20px;font-size:.8rem;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--muted);transition:all .15s;font-family:'Poppins',sans-serif}
    .cat-pill:hover{border-color:var(--green);color:var(--green)}
    .cat-pill.active{background:var(--green);color:#fff;border-color:var(--green)}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem}
    .card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;transition:box-shadow .15s,transform .15s}
    .card:hover{box-shadow:0 4px 20px rgba(16,185,129,.12);transform:translateY(-2px)}
    .card-img{width:100%;height:140px;background:var(--green-light);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
    .card-img img{width:100%;height:100%;object-fit:cover}
    .card-img .no-img{font-size:2.5rem}
    .status-badge{position:absolute;top:8px;right:8px;font-size:.7rem;font-weight:700;padding:.2rem .5rem;border-radius:20px}
    .status-in{background:var(--green-light);color:var(--green-dark)}
    .status-low{background:var(--yellow-light);color:#92400e}
    .status-out{background:var(--red-light);color:var(--red)}
    .card-body{padding:.875rem}
    .card-cat{font-size:.7rem;font-weight:600;color:var(--green);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.25rem}
    .card-name{font-size:.95rem;font-weight:700;margin-bottom:.4rem}
    .card-price{font-size:1.2rem;font-weight:700;color:var(--green-dark);margin-bottom:.75rem}
    .stock-info{margin-bottom:.75rem}
    .stock-row{display:flex;justify-content:space-between;font-size:.75rem;color:var(--muted);margin-bottom:.3rem}
    .stock-row span:last-child{font-weight:600;color:var(--text)}
    .progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
    .progress-fill{height:100%;border-radius:3px;transition:width .4s}
    .fill-green{background:var(--green)}.fill-yellow{background:var(--yellow)}.fill-red{background:var(--red)}
    .btn-sell{width:100%;padding:.6rem;background:var(--green);color:#fff;border:none;border-radius:8px;font-size:.875rem;font-weight:600;cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:center;gap:.4rem;font-family:'Poppins',sans-serif}
    .btn-sell:hover{background:var(--green-dark)}
    .btn-sell:disabled{background:#d1d5db;color:#9ca3af;cursor:not-allowed}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;justify-content:center}
    .overlay.open{display:flex}
    .modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:1.5rem;box-shadow:0 -4px 30px rgba(0,0,0,.15);animation:slideUp .25s ease}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 1.25rem}
    .modal h2{font-size:1rem;font-weight:700;margin-bottom:.25rem}
    .modal-sub{font-size:.8rem;color:var(--muted);margin-bottom:1.25rem}
    .qty-row{display:flex;align-items:center;gap:.75rem;margin-bottom:1.25rem}
    .qty-btn{width:40px;height:40px;border-radius:8px;border:1.5px solid var(--border);background:#fff;font-size:1.25rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;transition:all .15s;flex-shrink:0}
    .qty-btn:hover{border-color:var(--green);color:var(--green)}
    .qty-input{flex:1;text-align:center;font-size:1.5rem;font-weight:700;border:1.5px solid var(--border);border-radius:8px;padding:.5rem;outline:none;font-family:'Poppins',sans-serif;color:var(--text)}
    .qty-input:focus{border-color:var(--green)}
    .modal-error{font-size:.8rem;color:var(--red);margin-bottom:.75rem;display:none}
    .btn-confirm{width:100%;padding:.75rem;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;transition:background .15s;font-family:'Poppins',sans-serif}
    .btn-confirm:hover{background:var(--green-dark)}
    .btn-confirm:disabled{background:#a7f3d0;cursor:not-allowed}
    .toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:.75rem 1.25rem;border-radius:10px;font-size:.875rem;font-weight:500;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;display:flex;align-items:center;gap:.5rem}
    .toast.show{opacity:1;pointer-events:auto}
    .state{text-align:center;padding:4rem 1rem;color:var(--muted);grid-column:1/-1}
  </style>
</head>
<body>
<div class="sidebar-backdrop" id="sidebarBackdrop" onclick="closeSidebar()"></div>
<aside class="sidebar" id="sidebar">
  <div class="logo-area">
    <div><div class="logo-text">PriceCat</div><div class="logo-sub">Price & Stock Catalog</div></div>
    <button class="sidebar-close" onclick="closeSidebar()">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <nav>
    <div class="nav-label">Menu</div>
    <button class="nav-item active" id="navAll" onclick="filterCategory('');closeSidebar()">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      All Products
    </button>
    <div id="sidebarCats"></div>
  </nav>
  <div class="sidebar-footer">
    Associates View &nbsp;·&nbsp; <a href="/admin/index.html" style="color:var(--green);text-decoration:none">Admin</a>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <button class="menu-btn" onclick="openSidebar()">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
    </button>
    <h1 id="pageTitle">All Products</h1>
    <div class="search-wrap">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="search" id="search" placeholder="Search products..." autocomplete="off"/>
    </div>
    <div class="topbar-right"><span class="badge" id="countBadge">0 items</span></div>
  </div>
  <div class="content">
    <div class="category-bar" id="categoryBar"></div>
    <div class="grid" id="grid"><div class="state">Loading...</div></div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="modalName">Product</h2>
    <div class="modal-sub" id="modalSub"></div>
    <div class="qty-row">
      <button class="qty-btn" onclick="changeQty(-1)">−</button>
      <input type="number" class="qty-input" id="qtyInput" value="1" min="1"/>
      <button class="qty-btn" onclick="changeQty(1)">+</button>
    </div>
    <p class="modal-error" id="modalError"></p>
    <button class="btn-confirm" id="confirmBtn" onclick="confirmSale()">✓ Mark as Sold</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, getDocs, doc, updateDoc, increment } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyAvsqS7MzHKFjLU3WeeWFljfcsrUumn6Gk",
  authDomain: "inventory-app-31f06.firebaseapp.com",
  projectId: "inventory-app-31f06",
  storageBucket: "inventory-app-31f06.firebasestorage.app",
  messagingSenderId: "155610951063",
  appId: "1:155610951063:web:14c42a82daa84eb4cd28d2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allItems = [], activeCategory = '', searchTerm = '', debounceTimer = null, sellItemId = null;

function fmt(v){return new Intl.NumberFormat('en-NG',{style:'currency',currency:'NGN',maximumFractionDigits:0}).format(v||0)}

function stockStatus(item){
  const rem = (item.total_stock||0) - (item.units_sold||0);
  if(!item.total_stock) return null;
  if(rem<=0) return {label:'🔴 Out of Stock',cls:'status-out'};
  if(rem<20) return {label:'🟡 Low Stock',cls:'status-low'};
  return {label:'🟢 In Stock',cls:'status-in'};
}

function progressColor(pct){return pct>=80?'fill-red':pct>=50?'fill-yellow':'fill-green'}

function renderGrid(items){
  const countBadge = document.getElementById('countBadge');
  const grid = document.getElementById('grid');
  countBadge.textContent = items.length + ' item' + (items.length!==1?'s':'');
  if(!items.length){grid.innerHTML='<div class="state">No products found.</div>';return}
  grid.innerHTML = items.map(item=>{
    const rem = (item.total_stock||0)-(item.units_sold||0);
    const pct = item.total_stock>0?Math.round((item.units_sold/item.total_stock)*100):0;
    const status = stockStatus(item);
    const out = rem<=0 && item.total_stock>0;
    return `<div class="card">
      <div class="card-img">
        ${item.imageUrl?`<img src="${item.imageUrl}" alt="${item.name}" onerror="this.parentElement.innerHTML='<div class=no-img>📦</div>'"/>`:'<div class="no-img">📦</div>'}
        ${status?`<span class="status-badge ${status.cls}">${status.label}</span>`:''}
      </div>
      <div class="card-body">
        <div class="card-cat">${item.category||'General'}</div>
        <div class="card-name">${item.name}</div>
        <div class="card-price">${fmt(item.price)}</div>
        ${item.total_stock>0?`<div class="stock-info">
          <div class="stock-row"><span>Sold</span><span>${item.units_sold||0}/${item.total_stock}</span></div>
          <div class="progress-bar"><div class="progress-fill ${progressColor(pct)}" style="width:${pct}%"></div></div>
          <div class="stock-row" style="margin-top:.3rem"><span>Remaining</span><span>${rem} units</span></div>
        </div>`:''}
        <button class="btn-sell" onclick="window.openSell('${item.id}')" ${out?'disabled':''}>
          ${out?'Out of Stock':'Mark as Sold'}
        </button>
      </div>
    </div>`;
  }).join('');
}

function buildCategoryUI(items){
  const cats = [...new Set(items.map(i=>i.category||'General'))].sort();
  document.getElementById('categoryBar').innerHTML =
    `<span class="cat-pill active" data-cat="" onclick="window.filterCategory('')">All</span>` +
    cats.map(c=>`<span class="cat-pill" data-cat="${c}" onclick="window.filterCategory('${c}')">${c}</span>`).join('');
  document.getElementById('sidebarCats').innerHTML = cats.map(c=>`
    <button class="nav-item" data-cat="${c}" onclick="window.filterCategory('${c}');closeSidebar()">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>${c}
    </button>`).join('');
}

function applyFilters(){
  let items = allItems;
  if(activeCategory) items = items.filter(i=>i.category===activeCategory);
  if(searchTerm) items = items.filter(i=>i.name.toLowerCase().includes(searchTerm.toLowerCase()));
  renderGrid(items);
}

window.filterCategory = function(cat){
  activeCategory = cat;
  document.getElementById('pageTitle').textContent = cat||'All Products';
  document.querySelectorAll('.cat-pill').forEach(p=>p.classList.toggle('active',p.dataset.cat===cat));
  document.querySelectorAll('.nav-item[data-cat]').forEach(n=>n.classList.toggle('active',n.dataset.cat===cat));
  document.getElementById('navAll').classList.toggle('active',cat==='');
  applyFilters();
};

async function loadItems(){
  try{
    const snap = await getDocs(collection(db,'items'));
    allItems = snap.docs.map(d=>({id:d.id,...d.data()}));
    buildCategoryUI(allItems);
    applyFilters();
  }catch(e){
    document.getElementById('grid').innerHTML='<div class="state">Could not load products.</div>';
  }
}

window.openSell = function(id){
  sellItemId = id;
  const item = allItems.find(i=>i.id===id);
  const rem = (item.total_stock||0)-(item.units_sold||0);
  document.getElementById('modalName').textContent = item.name;
  document.getElementById('modalSub').textContent = `Price: ${fmt(item.price)} · Available: ${rem} units`;
  document.getElementById('qtyInput').value = 1;
  document.getElementById('qtyInput').max = rem;
  document.getElementById('modalError').style.display='none';
  document.getElementById('confirmBtn').disabled=false;
  document.getElementById('overlay').classList.add('open');
};

window.changeQty = function(delta){
  const input = document.getElementById('qtyInput');
  input.value = Math.max(1, parseInt(input.value||'1')+delta);
};

window.confirmSale = async function(){
  const qty = parseInt(document.getElementById('qtyInput').value);
  const errEl = document.getElementById('modalError');
  errEl.style.display='none';
  if(!qty||qty<1){errEl.textContent='Enter a valid quantity.';errEl.style.display='block';return}
  const item = allItems.find(i=>i.id===sellItemId);
  const rem = (item.total_stock||0)-(item.units_sold||0);
  if(qty>rem){errEl.textContent=`Only ${rem} units remaining.`;errEl.style.display='block';return}
  document.getElementById('confirmBtn').disabled=true;
  try{
    await updateDoc(doc(db,'items',sellItemId),{units_sold: increment(qty)});
    const idx = allItems.findIndex(i=>i.id===sellItemId);
    if(idx!==-1) allItems[idx].units_sold = (allItems[idx].units_sold||0)+qty;
    closeModal();
    applyFilters();
    showToast(`✓ Sold ${qty} unit${qty>1?'s':''} of ${item.name}`, sellItemId, qty);
  }catch{
    errEl.textContent='Failed to record sale. Try again.';
    errEl.style.display='block';
    document.getElementById('confirmBtn').disabled=false;
  }
};

window.undoSale = async function(itemId, qty){
  document.getElementById('toast').classList.remove('show');
  try{
    await updateDoc(doc(db,'items',itemId),{units_sold: increment(-qty)});
    const idx = allItems.findIndex(i=>i.id===itemId);
    if(idx!==-1) allItems[idx].units_sold = Math.max(0,(allItems[idx].units_sold||0)-qty);
    applyFilters();
    showToast('↩ Sale undone', null, 0);
  }catch{alert('Could not undo sale.')}
};

function showToast(msg, itemId, qty){
  const t = document.getElementById('toast');
  t.innerHTML = `<span>${msg}</span>${itemId?`<button onclick="window.undoSale('${itemId}',${qty})" style="background:rgba(255,255,255,.2);border:none;color:#fff;padding:.2rem .6rem;border-radius:6px;cursor:pointer;font-size:.8rem;font-family:'Poppins',sans-serif">Undo</button>`:''}`;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove('show'), 5000);
}

function openSidebar(){
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebarBackdrop').classList.add('open');
  history.pushState({sidebarOpen:true},'');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarBackdrop').classList.remove('open');
}
window.addEventListener('popstate',()=>{
  if(document.getElementById('sidebar').classList.contains('open')) closeSidebar();
});

window.closeModal = function(){document.getElementById('overlay').classList.remove('open');sellItemId=null};

document.getElementById('search').addEventListener('input',e=>{
  clearTimeout(debounceTimer);
  debounceTimer=setTimeout(()=>{searchTerm=e.target.value.trim();applyFilters()},300);
});

if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
loadItems();
</script>
</body>
</html>
