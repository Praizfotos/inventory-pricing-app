<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Price Catalog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#10b981" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #10b981; --green-dark: #059669; --green-light: #d1fae5;
      --yellow: #f59e0b; --yellow-light: #fef3c7;
      --red: #ef4444; --red-light: #fee2e2;
      --bg: #f0fdf4; --card: #fff; --text: #111827; --muted: #6b7280;
      --border: #e5e7eb; --radius: 12px;
    }
    body { font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }

    /* SIDEBAR */
    .sidebar { width: 220px; background: #fff; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 1.25rem 0; position: fixed; top: 0; left: 0; height: 100vh; z-index: 200; transition: transform 0.3s ease; }
    .logo-area { padding: 0 1.25rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .logo-text { font-size: 1.25rem; font-weight: 700; color: var(--green); }
    .logo-sub { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
    .sidebar-close { display: none; background: none; border: none; cursor: pointer; padding: 0.25rem; color: var(--muted); border-radius: 6px; }
    .sidebar-close:hover { background: var(--border); }
    nav { padding: 1rem 0.75rem; flex: 1; overflow-y: auto; }
    .nav-label { font-size: 0.7rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; padding: 0 0.5rem; margin-bottom: 0.5rem; margin-top: 1rem; }
    .nav-item { display: flex; align-items: center; gap: 0.625rem; padding: 0.55rem 0.75rem; border-radius: 8px; cursor: pointer; font-size: 0.875rem; color: var(--muted); transition: all 0.15s; margin-bottom: 2px; border: none; background: none; width: 100%; text-align: left; }
    .nav-item:hover { background: var(--green-light); color: var(--green-dark); }
    .nav-item.active { background: var(--green); color: #fff; font-weight: 600; }
    .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
    .sidebar-footer { padding: 1rem 1.25rem; border-top: 1px solid var(--border); font-size: 0.75rem; color: var(--muted); }
    .sidebar-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 199; }

    .menu-btn { display: none; background: none; border: none; cursor: pointer; padding: 0.25rem; border-radius: 6px; color: var(--text); }
    .menu-btn:hover { background: var(--border); }

    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .sidebar-close { display: flex; align-items: center; justify-content: center; }
      .sidebar-backdrop.open { display: block; }
      .menu-btn { display: flex; align-items: center; justify-content: center; }
      .main { margin-left: 0; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    }

    /* MAIN */
    .main { margin-left: 220px; flex: 1; display: flex; flex-direction: column; }

    /* TOPBAR */
    .topbar { background: #fff; border-bottom: 1px solid var(--border); padding: 0.875rem 1.5rem; display: flex; align-items: center; gap: 1rem; position: sticky; top: 0; z-index: 50; }
    .topbar h1 { font-size: 1.1rem; font-weight: 700; flex-shrink: 0; }
    .search-wrap { flex: 1; max-width: 480px; position: relative; }
    .search-wrap svg { position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); color: var(--muted); width: 16px; height: 16px; }
    .search-wrap input { width: 100%; padding: 0.5rem 0.75rem 0.5rem 2.25rem; border: 1px solid var(--border); border-radius: 8px; font-size: 0.875rem; outline: none; background: var(--bg); transition: border-color 0.15s; color: var(--text); }
    .search-wrap input:focus { border-color: var(--green); background: #fff; color: var(--text); }
    .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 0.5rem; }
    .badge { background: var(--green); color: #fff; font-size: 0.75rem; font-weight: 600; padding: 0.25rem 0.75rem; border-radius: 20px; }

    /* CONTENT */
    .content { padding: 1.5rem; flex: 1; }
    .category-bar { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.25rem; }
    .cat-pill { padding: 0.4rem 1rem; border-radius: 20px; font-size: 0.8rem; font-weight: 500; cursor: pointer; border: 1.5px solid var(--border); background: #fff; color: var(--muted); transition: all 0.15s; }
    .cat-pill:hover { border-color: var(--green); color: var(--green); }
    .cat-pill.active { background: var(--green); color: #fff; border-color: var(--green); }

    /* GRID */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; }
    .card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; transition: box-shadow 0.15s, transform 0.15s; }
    .card:hover { box-shadow: 0 4px 20px rgba(16,185,129,0.12); transform: translateY(-2px); }
    .card-img { width: 100%; height: 140px; background: var(--green-light); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
    .card-img img { width: 100%; height: 100%; object-fit: cover; }
    .card-img .no-img { font-size: 2.5rem; }
    .status-badge { position: absolute; top: 8px; right: 8px; font-size: 0.7rem; font-weight: 700; padding: 0.2rem 0.5rem; border-radius: 20px; }
    .status-in { background: var(--green-light); color: var(--green-dark); }
    .status-low { background: var(--yellow-light); color: #92400e; }
    .status-out { background: var(--red-light); color: var(--red); }
    .card-body { padding: 0.875rem; }
    .card-cat { font-size: 0.7rem; font-weight: 600; color: var(--green); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.25rem; }
    .card-name { font-size: 0.95rem; font-weight: 700; margin-bottom: 0.4rem; }
    .card-price { font-size: 1.2rem; font-weight: 700; color: var(--green-dark); margin-bottom: 0.75rem; }

    /* STOCK BAR */
    .stock-info { margin-bottom: 0.75rem; }
    .stock-row { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--muted); margin-bottom: 0.3rem; }
    .stock-row span:last-child { font-weight: 600; color: var(--text); }
    .progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
    .fill-green { background: var(--green); }
    .fill-yellow { background: var(--yellow); }
    .fill-red { background: var(--red); }

    /* SELL BUTTON */
    .btn-sell { width: 100%; padding: 0.6rem; background: var(--green); color: #fff; border: none; border-radius: 8px; font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: background 0.15s; display: flex; align-items: center; justify-content: center; gap: 0.4rem; }
    .btn-sell:hover { background: var(--green-dark); }
    .btn-sell:disabled { background: #d1d5db; color: #9ca3af; cursor: not-allowed; }

    /* SELL MODAL */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: none; align-items: flex-end; justify-content: center; padding: 0; }
    .overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 20px 20px 0 0; width: 100%; max-width: 480px; padding: 1.5rem; box-shadow: 0 -4px 30px rgba(0,0,0,0.15); animation: slideUp 0.25s ease; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 1.25rem; }
    .modal h2 { font-size: 1rem; font-weight: 700; margin-bottom: 0.25rem; }
    .modal .modal-sub { font-size: 0.8rem; color: var(--muted); margin-bottom: 1.25rem; }
    .qty-row { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.25rem; }
    .qty-btn { width: 40px; height: 40px; border-radius: 8px; border: 1.5px solid var(--border); background: #fff; font-size: 1.25rem; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 700; transition: all 0.15s; flex-shrink: 0; }
    .qty-btn:hover { border-color: var(--green); color: var(--green); }
    .qty-input { flex: 1; text-align: center; font-size: 1.5rem; font-weight: 700; border: 1.5px solid var(--border); border-radius: 8px; padding: 0.5rem; outline: none; }
    .qty-input:focus { border-color: var(--green); }
    .modal-error { font-size: 0.8rem; color: var(--red); margin-bottom: 0.75rem; display: none; }
    .btn-confirm { width: 100%; padding: 0.75rem; background: var(--green); color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: background 0.15s; }
    .btn-confirm:hover { background: var(--green-dark); }
    .btn-confirm:disabled { background: #a7f3d0; cursor: not-allowed; }

    /* TOAST */
    .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: #111; color: #fff; padding: 0.75rem 1.5rem; border-radius: 10px; font-size: 0.875rem; font-weight: 500; z-index: 300; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
    .toast.show { opacity: 1; }
    .state { text-align: center; padding: 4rem 1rem; color: var(--muted); grid-column: 1/-1; }
  </style>
</head>
<body>

<div class="sidebar-backdrop" id="sidebarBackdrop" onclick="closeSidebar()"></div>
<aside class="sidebar" id="sidebar">
  <div class="logo-area">
    <div>
      <div class="logo-text">PriceCat</div>
      <div class="logo-sub">Price & Stock Catalog</div>
    </div>
    <button class="sidebar-close" onclick="closeSidebar()" aria-label="Close menu">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <nav>
    <div class="nav-label">Menu</div>
    <button class="nav-item active" onclick="filterCategory(''); closeSidebar()">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      All Products
    </button>
    <div id="sidebarCats"></div>
  </nav>
  <div class="sidebar-footer">
    Associates View &nbsp;·&nbsp; <a href="/admin/" style="color:var(--green);text-decoration:none;">Admin</a>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <button onclick="toggleSidebar()" class="menu-btn" id="menuBtn" aria-label="Open menu">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
    </button>
    <h1 id="pageTitle">All Products</h1>
    <div class="search-wrap">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="search" id="search" placeholder="Search products..." autocomplete="off" />
    </div>
    <div class="topbar-right">
      <span class="badge" id="countBadge">0 items</span>
    </div>
  </div>

  <div class="content">
    <div class="category-bar" id="categoryBar"></div>
    <div class="grid" id="grid"><div class="state">Loading...</div></div>
  </div>
</div>

<!-- SELL MODAL -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="modalName">Product Name</h2>
    <div class="modal-sub" id="modalSub">Available: 0 units</div>
    <div class="qty-row">
      <button class="qty-btn" onclick="changeQty(-1)">−</button>
      <input type="number" class="qty-input" id="qtyInput" value="1" min="1" />
      <button class="qty-btn" onclick="changeQty(1)">+</button>
    </div>
    <p class="modal-error" id="modalError"></p>
    <button class="btn-confirm" id="confirmBtn" onclick="confirmSale()">
      ✓ Mark as Sold
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  function toggleSidebar() {
    const isOpen = document.getElementById('sidebar').classList.contains('open');
    if (isOpen) {
      closeSidebar();
    } else {
      openSidebar();
    }
  }

  function openSidebar() {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('sidebarBackdrop').classList.add('open');
    // Push state so back button closes sidebar instead of leaving page
    history.pushState({ sidebarOpen: true }, '');
  }

  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarBackdrop').classList.remove('open');
  }

  // Handle back button — close sidebar instead of leaving
  window.addEventListener('popstate', function(e) {
    if (document.getElementById('sidebar').classList.contains('open')) {
      closeSidebar();
    }
  });
  let activeCategory = '';
  let searchTerm = '';
  let debounceTimer = null;
  let sellItemId = null;

  const grid = document.getElementById('grid');
  const countBadge = document.getElementById('countBadge');
  const categoryBar = document.getElementById('categoryBar');
  const sidebarCats = document.getElementById('sidebarCats');
  const pageTitle = document.getElementById('pageTitle');
  const overlay = document.getElementById('overlay');

  function fmt(v) { return new Intl.NumberFormat('en-NG', { style: 'currency', currency: 'NGN', maximumFractionDigits: 0 }).format(v); }

  function stockStatus(item) {
    const rem = item.units_remaining ?? (item.total_stock - item.units_sold);
    if (item.total_stock === 0) return null;
    if (rem <= 0) return { label: '🔴 Out of Stock', cls: 'status-out' };
    if (rem < 20) return { label: '🟡 Low Stock', cls: 'status-low' };
    return { label: '🟢 In Stock', cls: 'status-in' };
  }

  function progressColor(pct) {
    if (pct >= 80) return 'fill-red';
    if (pct >= 50) return 'fill-yellow';
    return 'fill-green';
  }

  function renderGrid(items) {
    countBadge.textContent = items.length + ' item' + (items.length !== 1 ? 's' : '');
    if (!items.length) {
      grid.innerHTML = '<div class="state">No products found.</div>';
      return;
    }
    grid.innerHTML = items.map(item => {
      const rem = item.total_stock > 0 ? (item.total_stock - item.units_sold) : null;
      const pct = item.total_stock > 0 ? Math.round((item.units_sold / item.total_stock) * 100) : 0;
      const status = stockStatus(item);
      const outOfStock = rem !== null && rem <= 0;

      return `<div class="card">
        <div class="card-img">
          ${item.imageUrl
            ? `<img src="${item.imageUrl}" alt="${item.name}" onerror="this.parentElement.innerHTML='<div class=no-img>📦</div>'" />`
            : '<div class="no-img">📦</div>'}
          ${status ? `<span class="status-badge ${status.cls}">${status.label}</span>` : ''}
        </div>
        <div class="card-body">
          <div class="card-cat">${item.category || 'General'}</div>
          <div class="card-name">${item.name}</div>
          <div class="card-price">${fmt(item.price)}</div>
          ${item.total_stock > 0 ? `
          <div class="stock-info">
            <div class="stock-row"><span>Sold</span><span>${item.units_sold} / ${item.total_stock}</span></div>
            <div class="progress-bar"><div class="progress-fill ${progressColor(pct)}" style="width:${pct}%"></div></div>
            <div class="stock-row" style="margin-top:0.3rem"><span>Remaining</span><span>${rem} units</span></div>
          </div>` : ''}
          <button class="btn-sell" onclick="openSell(${item.id})" ${outOfStock ? 'disabled' : ''}>
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            ${outOfStock ? 'Out of Stock' : 'Mark as Sold'}
          </button>
        </div>
      </div>`;
    }).join('');
  }

  function buildCategoryUI(items) {
    const cats = [...new Set(items.map(i => i.category || 'General'))].sort();
    categoryBar.innerHTML = `<span class="cat-pill active" data-cat="" onclick="filterCategory('')">All</span>` +
      cats.map(c => `<span class="cat-pill" data-cat="${c}" onclick="filterCategory('${c}')">${c}</span>`).join('');
    sidebarCats.innerHTML = cats.map(c => `
      <button class="nav-item" data-cat="${c}" onclick="filterCategory('${c}'); closeSidebar()">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>${c}
      </button>`).join('');
  }

  function applyFilters() {
    let items = allItems;
    if (activeCategory) items = items.filter(i => i.category === activeCategory);
    if (searchTerm) items = items.filter(i => i.name.toLowerCase().includes(searchTerm.toLowerCase()));
    renderGrid(items);
  }

  function filterCategory(cat) {
    activeCategory = cat;
    pageTitle.textContent = cat || 'All Products';
    document.querySelectorAll('.cat-pill').forEach(p => p.classList.toggle('active', p.dataset.cat === cat));
    document.querySelectorAll('.nav-item[data-cat]').forEach(n => n.classList.toggle('active', n.dataset.cat === cat));
    document.querySelector('.nav-item:not([data-cat])')?.classList.toggle('active', cat === '');
    applyFilters();
  }

  async function loadItems() {
    try {
      const res = await fetch('/api/items');
      if (!res.ok) throw new Error();
      allItems = await res.json();
      buildCategoryUI(allItems);
      applyFilters();
    } catch {
      grid.innerHTML = '<div class="state">Could not load products.</div>';
    }
  }

  // SELL MODAL
  function openSell(id) {
    sellItemId = id;
    const item = allItems.find(i => i.id === id);
    const rem = item.total_stock - item.units_sold;
    document.getElementById('modalName').textContent = item.name;
    document.getElementById('modalSub').textContent = `Price: ${fmt(item.price)} · Available: ${rem} units`;
    document.getElementById('qtyInput').value = 1;
    document.getElementById('qtyInput').max = rem;
    document.getElementById('modalError').style.display = 'none';
    document.getElementById('confirmBtn').disabled = false;
    overlay.classList.add('open');
  }

  function closeModal() { overlay.classList.remove('open'); sellItemId = null; }

  function changeQty(delta) {
    const input = document.getElementById('qtyInput');
    const val = Math.max(1, parseInt(input.value || '1') + delta);
    input.value = val;
  }

  async function confirmSale() {
    const qty = parseInt(document.getElementById('qtyInput').value);
    const errEl = document.getElementById('modalError');
    errEl.style.display = 'none';
    if (!qty || qty < 1) { errEl.textContent = 'Enter a valid quantity.'; errEl.style.display = 'block'; return; }

    const confirmBtn = document.getElementById('confirmBtn');
    confirmBtn.disabled = true;
    try {
      const res = await fetch('/api/sale', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ itemId: sellItemId, quantity: qty }),
      });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.error || 'Failed to record sale.'; errEl.style.display = 'block'; confirmBtn.disabled = false; return; }

      // Update local data
      const idx = allItems.findIndex(i => i.id === sellItemId);
      if (idx !== -1) allItems[idx] = { ...allItems[idx], ...data };
      const soldId = sellItemId;
      closeModal();
      applyFilters();
      showToast(`✓ Sold ${qty} unit${qty > 1 ? 's' : ''} of ${data.name}`, soldId, qty);
    } catch {
      errEl.textContent = 'Network error. Try again.';
      errEl.style.display = 'block';
      confirmBtn.disabled = false;
    }
  }

  function showToast(msg, itemId, qty) {
    const t = document.getElementById('toast');
    t.innerHTML = `<span>${msg}</span><button onclick="undoSale(${itemId},${qty})" style="margin-left:0.75rem;background:rgba(255,255,255,0.2);border:none;color:#fff;padding:0.2rem 0.6rem;border-radius:6px;cursor:pointer;font-size:0.8rem;font-family:'Poppins',sans-serif">Undo</button>`;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 5000);
  }

  async function undoSale(itemId, qty) {
    document.getElementById('toast').classList.remove('show');
    try {
      const res = await fetch('/api/sale/reverse', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ itemId, quantity: qty }),
      });
      const data = await res.json();
      if (!res.ok) { alert(data.error || 'Failed to undo sale.'); return; }
      const idx = allItems.findIndex(i => i.id === itemId);
      if (idx !== -1) allItems[idx] = { ...allItems[idx], ...data };
      applyFilters();
      const t = document.getElementById('toast');
      t.innerHTML = `<span>↩ Sale undone</span>`;
      t.classList.add('show');
      clearTimeout(t._timer);
      t._timer = setTimeout(() => t.classList.remove('show'), 2000);
    } catch {
      alert('Network error. Could not undo.');
    }
  }

  document.getElementById('search').addEventListener('input', e => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => { searchTerm = e.target.value.trim(); applyFilters(); }, 300);
  });

  // Register service worker for offline support
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
  loadItems();
</script>
</body>
</html>
