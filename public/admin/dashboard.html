<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #10b981; --green-dark: #059669; --green-light: #d1fae5;
      --bg: #f0fdf4; --card: #fff; --text: #111827; --muted: #6b7280;
      --border: #e5e7eb; --red: #ef4444; --red-light: #fee2e2; --radius: 12px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }

    /* SIDEBAR */
    .sidebar { width: 220px; background: #fff; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 1.25rem 0; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; }
    .logo-area { padding: 0 1.25rem 1.5rem; border-bottom: 1px solid var(--border); }
    .logo-text { font-size: 1.25rem; font-weight: 700; color: var(--green); }
    .logo-sub { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
    nav { padding: 1rem 0.75rem; flex: 1; }
    .nav-label { font-size: 0.7rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; padding: 0 0.5rem; margin-bottom: 0.5rem; margin-top: 1rem; }
    .nav-item { display: flex; align-items: center; gap: 0.625rem; padding: 0.55rem 0.75rem; border-radius: 8px; cursor: pointer; font-size: 0.875rem; color: var(--muted); transition: all 0.15s; margin-bottom: 2px; border: none; background: none; width: 100%; text-align: left; }
    .nav-item:hover { background: var(--green-light); color: var(--green-dark); }
    .nav-item.active { background: var(--green); color: #fff; font-weight: 600; }
    .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
    .sidebar-footer { padding: 1rem 1.25rem; border-top: 1px solid var(--border); }
    .logout-btn { width: 100%; padding: 0.5rem; background: var(--red-light); color: var(--red); border: none; border-radius: 8px; font-size: 0.875rem; cursor: pointer; font-weight: 500; transition: background 0.15s; }
    .logout-btn:hover { background: #fecaca; }

    /* MAIN */
    .main { margin-left: 220px; flex: 1; display: flex; flex-direction: column; }

    /* TOPBAR */
    .topbar { background: #fff; border-bottom: 1px solid var(--border); padding: 0.875rem 1.5rem; display: flex; align-items: center; gap: 1rem; position: sticky; top: 0; z-index: 50; }
    .topbar h1 { font-size: 1.1rem; font-weight: 700; }
    .topbar p { font-size: 0.8rem; color: var(--muted); }
    .topbar-right { margin-left: auto; }
    .btn-primary { background: var(--green); color: #fff; border: none; border-radius: 8px; padding: 0.55rem 1.1rem; font-size: 0.875rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 0.4rem; transition: background 0.15s; }
    .btn-primary:hover { background: var(--green-dark); }
    .btn-primary:disabled { background: #a7f3d0; cursor: not-allowed; }

    /* CONTENT */
    .content { padding: 1.5rem; }

    /* STATS */
    .stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 1.1rem; }
    .stat-label { font-size: 0.75rem; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.4rem; }
    .stat-value { font-size: 1.75rem; font-weight: 700; color: var(--text); }
    .stat-sub { font-size: 0.75rem; color: var(--green); margin-top: 0.2rem; }

    /* MODAL */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: none; align-items: center; justify-content: center; padding: 1rem; }
    .overlay.open { display: flex; }
    .modal { background: #fff; border-radius: var(--radius); width: 100%; max-width: 480px; padding: 1.5rem; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
    .modal h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 1.25rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .form-group { margin-bottom: 0.875rem; }
    .form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text); margin-bottom: 0.35rem; }
    .form-group input, .form-group select { width: 100%; padding: 0.55rem 0.75rem; border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.9rem; outline: none; transition: border-color 0.15s; }
    .form-group input:focus, .form-group select:focus { border-color: var(--green); }
    .modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1rem; }
    .btn-cancel { background: var(--bg); color: var(--muted); border: 1px solid var(--border); border-radius: 8px; padding: 0.55rem 1rem; font-size: 0.875rem; cursor: pointer; }
    .btn-cancel:hover { background: var(--border); }
    .modal-error { font-size: 0.8rem; color: var(--red); margin-top: 0.5rem; display: none; }

    /* TABLE */
    .table-wrap { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
    .table-header { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
    .table-header h2 { font-size: 0.95rem; font-weight: 700; }
    .search-wrap { position: relative; flex: 1; max-width: 320px; }
    .search-wrap svg { position: absolute; left: 0.65rem; top: 50%; transform: translateY(-50%); color: var(--muted); width: 14px; height: 14px; }
    .search-wrap input { width: 100%; padding: 0.45rem 0.75rem 0.45rem 2rem; border: 1px solid var(--border); border-radius: 8px; font-size: 0.85rem; outline: none; }
    .search-wrap input:focus { border-color: var(--green); }
    .cat-filter { padding: 0.45rem 0.75rem; border: 1px solid var(--border); border-radius: 8px; font-size: 0.85rem; outline: none; background: #fff; }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    thead th { text-align: left; padding: 0.75rem 1rem; background: var(--bg); color: var(--muted); font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); }
    tbody td { padding: 0.875rem 1rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #fafafa; }
    .item-img { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; background: var(--green-light); display: flex; align-items: center; justify-content: center; font-size: 1.25rem; flex-shrink: 0; overflow: hidden; }
    .item-img img { width: 100%; height: 100%; object-fit: cover; }
    .item-info { display: flex; align-items: center; gap: 0.75rem; }
    .item-name { font-weight: 600; }
    .item-cat { font-size: 0.75rem; color: var(--muted); }
    .price-tag { font-weight: 700; color: var(--green-dark); font-size: 1rem; }
    .cat-badge { background: var(--green-light); color: var(--green-dark); font-size: 0.7rem; font-weight: 600; padding: 0.2rem 0.6rem; border-radius: 20px; }
    .recent-dot { display: inline-block; width: 7px; height: 7px; background: var(--green); border-radius: 50%; margin-right: 4px; }
    .actions { display: flex; gap: 0.5rem; }
    .btn-edit { background: var(--green-light); color: var(--green-dark); border: none; border-radius: 6px; padding: 0.35rem 0.75rem; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: background 0.15s; }
    .btn-edit:hover { background: #a7f3d0; }
    .btn-del { background: var(--red-light); color: var(--red); border: none; border-radius: 6px; padding: 0.35rem 0.75rem; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: background 0.15s; }
    .btn-del:hover { background: #fecaca; }
    .empty-row td { text-align: center; color: var(--muted); padding: 3rem; font-style: italic; }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main { margin-left: 0; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="logo-area">
    <div class="logo-text">PriceCat</div>
    <div class="logo-sub">Admin Panel</div>
  </div>
  <nav>
    <div class="nav-label">Main Menu</div>
    <button class="nav-item active">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Products
    </button>
    <a href="/" class="nav-item" style="text-decoration:none">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      Associate View
    </a>
  </nav>
  <div class="sidebar-footer">
    <button class="logout-btn" id="logoutBtn">Sign Out</button>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div>
      <h1>Products</h1>
      <p>Manage your price catalog</p>
    </div>
    <div class="topbar-right">
      <button class="btn-primary" onclick="openModal()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        Add Product
      </button>
    </div>
  </div>

  <div class="content">
    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Total Products</div>
        <div class="stat-value" id="statTotal">—</div>
        <div class="stat-sub">in catalog</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Categories</div>
        <div class="stat-value" id="statCats">—</div>
        <div class="stat-sub">product groups</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Updated Today</div>
        <div class="stat-value" id="statRecent">—</div>
        <div class="stat-sub">price changes</div>
      </div>
    </div>

    <div class="table-wrap">
      <div class="table-header">
        <h2>All Products</h2>
        <div class="search-wrap">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="search" id="search" placeholder="Search products..." />
        </div>
        <select class="cat-filter" id="catFilter"><option value="">All Categories</option></select>
      </div>
      <table>
        <thead>
          <tr>
            <th>Product</th>
            <th>Category</th>
            <th>Price</th>
            <th>Last Updated</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr class="empty-row"><td colspan="5">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modalTitle">Add Product</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Product Name *</label>
        <input type="text" id="fName" placeholder="e.g. Widget A" />
      </div>
      <div class="form-group">
        <label>Price *</label>
        <input type="number" id="fPrice" placeholder="0.00" min="0.01" step="0.01" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Category</label>
        <input type="text" id="fCategory" placeholder="e.g. Electronics" />
      </div>
      <div class="form-group">
        <label>Product Image</label>
        <input type="file" id="fImage" accept="image/*" style="padding:0.4rem 0.5rem;font-size:0.8rem;" />
        <div id="imgPreview" style="margin-top:0.5rem;display:none;">
          <img id="imgPreviewImg" style="width:60px;height:60px;object-fit:cover;border-radius:8px;border:1px solid var(--border);" />
          <button type="button" onclick="clearImage()" style="margin-left:0.5rem;background:var(--red-light);color:var(--red);border:none;border-radius:6px;padding:0.25rem 0.5rem;font-size:0.75rem;cursor:pointer;">Remove</button>
        </div>
      </div>
    </div>
    <p class="modal-error" id="modalError"></p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" id="saveBtn" onclick="saveItem()">Save Product</button>
    </div>
  </div>
</div>

<script>
  let items = [];
  let editingId = null;
  let searchTerm = '';
  let catFilter = '';
  let debounceTimer = null;
  let pendingImageBase64 = null; // holds base64 of newly selected image

  const tbody = document.getElementById('tbody');
  const overlay = document.getElementById('overlay');
  const modalTitle = document.getElementById('modalTitle');
  const modalError = document.getElementById('modalError');
  const saveBtn = document.getElementById('saveBtn');
  const catFilterEl = document.getElementById('catFilter');

  // Image file picker → compressed base64
  document.getElementById('fImage').addEventListener('change', function() {
    const file = this.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        // Resize to max 400x400 and compress
        const canvas = document.createElement('canvas');
        const MAX = 400;
        let w = img.width, h = img.height;
        if (w > h) { if (w > MAX) { h = h * MAX / w; w = MAX; } }
        else { if (h > MAX) { w = w * MAX / h; h = MAX; } }
        canvas.width = w;
        canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        pendingImageBase64 = canvas.toDataURL('image/jpeg', 0.7);
        document.getElementById('imgPreviewImg').src = pendingImageBase64;
        document.getElementById('imgPreview').style.display = 'flex';
        document.getElementById('imgPreview').style.alignItems = 'center';
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });

  function clearImage() {
    pendingImageBase64 = null;
    document.getElementById('fImage').value = '';
    document.getElementById('imgPreview').style.display = 'none';
    document.getElementById('imgPreviewImg').src = '';
  }

  function fmt(v) { return new Intl.NumberFormat('en-NG', { style: 'currency', currency: 'NGN' }).format(v); }
  function timeAgo(d) {
    const diff = Date.now() - new Date(d).getTime();
    const m = Math.floor(diff / 60000);
    if (m < 1) return 'just now';
    if (m < 60) return m + 'm ago';
    const h = Math.floor(m / 60);
    if (h < 24) return h + 'h ago';
    return Math.floor(h / 24) + 'd ago';
  }
  function isRecent(d) { return Date.now() - new Date(d).getTime() < 24 * 60 * 60 * 1000; }

  function redirect401() { window.location.href = '/admin/index.html'; }

  function updateStats() {
    document.getElementById('statTotal').textContent = items.length;
    const cats = new Set(items.map(i => i.category || 'General'));
    document.getElementById('statCats').textContent = cats.size;
    document.getElementById('statRecent').textContent = items.filter(i => isRecent(i.updatedAt)).length;
  }

  function updateCatFilter() {
    const cats = [...new Set(items.map(i => i.category || 'General'))].sort();
    catFilterEl.innerHTML = '<option value="">All Categories</option>' +
      cats.map(c => `<option value="${c}">${c}</option>`).join('');
    catFilterEl.value = catFilter;
  }

  function renderTable() {
    let filtered = items;
    if (searchTerm) filtered = filtered.filter(i => i.name.toLowerCase().includes(searchTerm.toLowerCase()));
    if (catFilter) filtered = filtered.filter(i => (i.category || 'General') === catFilter);

    if (!filtered.length) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="5">No products found.</td></tr>';
      return;
    }

    tbody.innerHTML = filtered.map(item => `
      <tr>
        <td>
          <div class="item-info">
            <div class="item-img">
              ${item.imageUrl
                ? `<img src="${item.imageUrl}" alt="${item.name}" onerror="this.parentElement.textContent='📦'" />`
                : '📦'}
            </div>
            <div>
              <div class="item-name">${item.name}</div>
            </div>
          </div>
        </td>
        <td><span class="cat-badge">${item.category || 'General'}</span></td>
        <td><span class="price-tag">${fmt(item.price)}</span></td>
        <td>${isRecent(item.updatedAt) ? '<span class="recent-dot"></span>' : ''}${timeAgo(item.updatedAt)}</td>
        <td>
          <div class="actions">
            <button class="btn-edit" onclick="openEdit(${item.id})">Edit</button>
            <button class="btn-del" onclick="deleteItem(${item.id})">Delete</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  async function loadItems() {
    try {
      const res = await fetch('/api/items');
      if (res.status === 401) { redirect401(); return; }
      items = await res.json();
      updateStats();
      updateCatFilter();
      renderTable();
    } catch {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="5">Failed to load products.</td></tr>';
    }
  }

  function openModal(id = null) {
    editingId = id;
    pendingImageBase64 = null;
    modalTitle.textContent = id ? 'Edit Product' : 'Add Product';
    modalError.style.display = 'none';
    document.getElementById('fImage').value = '';
    document.getElementById('imgPreview').style.display = 'none';

    if (id) {
      const item = items.find(i => i.id === id);
      document.getElementById('fName').value = item.name;
      document.getElementById('fPrice').value = item.price;
      document.getElementById('fCategory').value = item.category || '';
      // Show existing image preview
      if (item.imageUrl) {
        document.getElementById('imgPreviewImg').src = item.imageUrl;
        document.getElementById('imgPreview').style.display = 'flex';
        document.getElementById('imgPreview').style.alignItems = 'center';
        pendingImageBase64 = item.imageUrl; // keep existing unless replaced
      }
    } else {
      document.getElementById('fName').value = '';
      document.getElementById('fPrice').value = '';
      document.getElementById('fCategory').value = '';
    }
    overlay.classList.add('open');
    document.getElementById('fName').focus();
  }

  function openEdit(id) { openModal(id); }
  function closeModal() { overlay.classList.remove('open'); editingId = null; }

  async function saveItem() {
    const name = document.getElementById('fName').value.trim();
    const price = parseFloat(document.getElementById('fPrice').value);
    const category = document.getElementById('fCategory').value.trim() || 'General';
    const imageUrl = pendingImageBase64 || '';

    modalError.style.display = 'none';
    if (!name) { modalError.textContent = 'Product name is required.'; modalError.style.display = 'block'; return; }
    if (isNaN(price) || price <= 0) { modalError.textContent = 'Price must be greater than 0.'; modalError.style.display = 'block'; return; }

    saveBtn.disabled = true;
    try {
      const url = editingId ? `/api/admin/items/${editingId}` : '/api/admin/items';
      const method = editingId ? 'PUT' : 'POST';
      const res = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, price, category, imageUrl }),
      });
      if (res.status === 401) { redirect401(); return; }
      if (!res.ok) {
        const d = await res.json().catch(() => ({}));
        modalError.textContent = d.error || 'Failed to save.';
        modalError.style.display = 'block';
        return;
      }
      closeModal();
      await loadItems();
    } catch {
      modalError.textContent = 'Network error.';
      modalError.style.display = 'block';
    } finally {
      saveBtn.disabled = false;
    }
  }

  async function deleteItem(id) {
    if (!confirm('Delete this product?')) return;
    const res = await fetch(`/api/admin/items/${id}`, { method: 'DELETE' });
    if (res.status === 401) { redirect401(); return; }
    await loadItems();
  }

  document.getElementById('search').addEventListener('input', e => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => { searchTerm = e.target.value.trim(); renderTable(); }, 200);
  });

  catFilterEl.addEventListener('change', e => { catFilter = e.target.value; renderTable(); });

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await fetch('/api/admin/logout', { method: 'POST' });
    window.location.href = '/admin/index.html';
  });

  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  loadItems();
</script>
</body>
</html>
